services:
  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: minio
    ports:
      - "80:8000"
      - "9020:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      SPARK_DRIVER_OPTS: -verbose:class
      SPARK_EXECUTOR_OPTS: -verbose:class
    volumes:
      - ./services/minio/resources/config/entrypoint.sh:/entrypoint.sh:ro
      - ./services/minio/resources/config/docker-entrypoint-init.d:/docker-entrypoint-init.d:ro
    entrypoint: ["/entrypoint.sh"]
    networks:
      pipeline-net:
        aliases:
          # Intercepts standard AWS S3 lookups inside the network
          - s3.us-east-1.amazonaws.com
          - errors.s3.us-east-1.amazonaws.com

  opensearch-node-1:
    image: opensearchproject/opensearch:latest
    container_name: opensearch-node-1
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node-1
      - discovery.seed_hosts=opensearch-node-2
      - cluster.initial_cluster_manager_nodes=opensearch-node-1,opensearch-node-2
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=YourSecurePassword123!
      - "DISABLE_INSTALL_DEMO_CONFIG=false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - 9200:9200
    networks:
      - pipeline-net

  opensearch-node-2:
    image: opensearchproject/opensearch:latest
    container_name: opensearch-node-2
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node-2
      - discovery.seed_hosts=opensearch-node-1
      - cluster.initial_cluster_manager_nodes=opensearch-node-1,opensearch-node-2
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=YourSecurePassword123!
      - "DISABLE_INSTALL_DEMO_CONFIG=false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - pipeline-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: opensearch-dashboards
    ports:
      - 5601:5601
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch-node-1:9200","https://opensearch-node-2:9200"]'
      OPENSEARCH_USERNAME: "admin"
      OPENSEARCH_PASSWORD: "YourSecurePassword123!"
      OPENSEARCH_SSL_VERIFICATIONMODE: "none"
    networks:
      - pipeline-net

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - 9094:9094
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
    networks:
      - pipeline-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "9080:8080"
    depends_on:
      - kafka
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: "local-cluster"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
    networks:
      - pipeline-net

  kafka-connect:
    build: ./services/kafka-connect
    container_name: kafka-connect
    depends_on:
      - kafka
      - opensearch-node-1
      - opensearch-node-2
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:9092"
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: "kafka-connect-opensearch-group"
      CONNECT_CONFIG_STORAGE_TOPIC: "connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "connect-status"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
      CONNECT_VALUE_CONVERTER_schemas.enable: "false"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components,/usr/share/kafka/plugins"
      CONNECT_PLUGIN_ISOLATED_PACKAGES: "com.fasterxml.jackson."
      CONNECT_PLUGIN_PATH_ISOLATION_ONLY: "true"
    ports:
      - "8083:8083"
    networks:
      - pipeline-net
    # volumes:
    #   - ./resources/kafka-connect/config/kafka-connect.properties:/etc/kafka-connect/kafka-connect.properties
    #   # Automatically install the OpenSearch Sink Connector plugin
    #   - ./plugins:/usr/share/confluent-hub-components

networks:
  pipeline-net:
    driver: bridge
