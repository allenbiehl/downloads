# 1. KEEP your existing classpath mappings so Spark sees the JAR file
spark.driver.extraClassPath       /opt/spark/jars/app-spark-common-1.0.jar
spark.executor.extraClassPath     /opt/spark/jars/app-spark-common-1.0.jar
spark.driver.userClassPathFirst   true
spark.executor.userClassPathFirst true

# 2. REMOVE the old -D property flags that the AWS bundle was ignoring.
# REPLACE them with this official Hadoop configuration key:
spark.hadoop.fs.s3a.aws.request.handlers  app.apache.spark.internal.io.GlobalS3Interceptor