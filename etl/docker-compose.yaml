services:
  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: minio
    ports:
      - "9020:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      SPARK_DRIVER_OPTS: -verbose:class
      SPARK_EXECUTOR_OPTS: -verbose:class
    volumes:
      - ./resources/minio/config/entrypoint.sh:/entrypoint.sh:ro
      - ./resources/minio/config/docker-entrypoint-init.d:/docker-entrypoint-init.d:ro
    entrypoint: ["/entrypoint.sh"]
    profiles:
      - minio
      - backend
      - all

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # Configure KRaft role as both broker and controller
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"

      # Define listeners for inside the docker network and outside (localhost)
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"

      # Required cluster configuration
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      # 2. Allow commits with 1 in-sync replica (Defaults to 2)
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # 3. Ensure internal routing works
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
    profiles:
      - kafka
      - backend
      - all

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "9080:8080"
    depends_on:
      - kafka
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: "local-cluster"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
    profiles:
      - kafka
      - backend
      - all

  etl:
    build: .
    container_name: etl
    environment:
      PYTHONPATH: /app/src
      DATAFLOW_CONFIG_DIR: "/app/config"
      MINIO_AWS_ACCESS_KEY_ID: admin
      MINIO_AWS_SECRET_ACCESS_KEY: password
      MINIO_AWS_ENDPOINT_URL: "http://minio:9000"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      KAFKA_TOPIC: telemetry-geo
      KAFKA_KEY_FIELD: event_id
      KAFKA_TRANSACTIONAL_ID_PREFIX: etl
      OPENSEARCH_HOST: localhost
      OPENSEARCH_PORT: "9200"
      OPENSEARCH_INDEX: company_historical_logs
    command: tail -f /dev/null
    volumes:
      - ./src:/app/src
      - ./resources/etl/config:/app/config
    profiles:
      - etl
      - all
