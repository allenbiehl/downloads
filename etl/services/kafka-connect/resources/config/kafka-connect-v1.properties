# ------------------------------------------------------------------------
# 1. Connection and Clustering Infrastructure
# ------------------------------------------------------------------------
# Point to your shared Kafka Brokers (use commas for multiple brokers)
bootstrap.servers=kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092

# Every node in the group MUST use the exact same cluster ID
group.id=cdet-production-connect-cluster

# ------------------------------------------------------------------------
# 2. Network REST Configuration (Must be unique per node machine!)
# ------------------------------------------------------------------------
listeners=http://0.0.0

# CHANGE THIS ON EACH MACHINE: Set to the explicit internal IP of the node
# Node 1: 10.0.0.1  |  Node 2: 10.0.0.2  |  Node 3: 10.0.0.3
rest.advertised.host.name=10.0.0.1
rest.advertised.port=8083

# ------------------------------------------------------------------------
# 3. Serialization and Framework Schemas
# ------------------------------------------------------------------------
key.converter=org.apache.kafka.connect.storage.StringConverter
value.converter=org.apache.kafka.connect.json.JsonConverter
value.converter.schemas.enable=false

# ------------------------------------------------------------------------
# 4. Distributed Coordination Topics (Production 3-Replica Rules)
# ------------------------------------------------------------------------
# The internal topics store cluster metadata. Replicas MUST be >= 3 in prod.
config.storage.topic=connect-cluster-configs
config.storage.replication.factor=3

offset.storage.topic=connect-cluster-offsets
offset.storage.replication.factor=3
offset.storage.partitions=25

status.storage.topic=connect-cluster-status
status.storage.replication.factor=3
status.storage.partitions=5

# ------------------------------------------------------------------------
# 5. Core Plugin Discovery Location
# ------------------------------------------------------------------------
plugin.path=/usr/share/java/plugins
